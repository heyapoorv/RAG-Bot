name: DocIntel AI CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Test Job ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-level: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential gcc

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          ENVIRONMENT: development
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: test_db
          JWT_SECRET: test-secret-32-characters-minimum-x
          PINECONE_API_KEY: test-key
          GOOGLE_API_KEY: test-key
          PROMETHEUS_ENABLED: false
        run: |
          pytest tests/ -v --tb=short

  # ── Docker Build Job ────────────────────────────────────────────────────────
  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: docintel-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: docintel-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
